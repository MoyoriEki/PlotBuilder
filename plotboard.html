<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!-- interactive-widget=resizes-content: ソフトキーボード表示時にレイアウトを
     縮めて、メモ編集モーダル等がキーボードに隠れないようにする(Android Chrome) -->
<meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
<link rel="icon" href="data:,">
<title>プロットボード</title>
<!-- ストレージブリッジ（Dropbox連携の共通ライブラリ・無改造で利用）
     読み込みに失敗した場合はローカルのみモードで動作する -->
<link rel="stylesheet" href="https://moyorieki.github.io/storage-bridge/storage-bridge.css">
<script src="https://moyorieki.github.io/storage-bridge/storage-bridge.js"></script>
<style>
/* ============================================================
   プロットボード Phase 1
   方眼紙イメージの薄いグリッド + パステル系ブロック
   ============================================================ */
:root{
  --paper: #fafaf7;
  --line: #dfe5ea;
  --ink: #333a40;
  --accent: #4a90d9;
  --danger: #c53030;
}
*{ box-sizing: border-box; margin: 0; padding: 0; }
html, body{ height: 100%; }
body{
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN",
               "Noto Sans JP", "Yu Gothic UI", sans-serif;
  background: var(--paper);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ---- ビュー切替 ---- */
#titleView, #boardView{
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
#titleView[hidden], #boardView[hidden]{ display: none; }

/* ---- ヘッダー ---- */
header{
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid #e4e7ea;
  background: #ffffffcc;
  flex: none;
  min-height: 46px;
}
header h1{
  font-size: 15px; font-weight: 700; letter-spacing: .04em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#backBtn, #syncBtn{
  flex: none;
  width: 32px; height: 32px;
  border-radius: 9px;
  border: 1px solid #c9d2d9;
  background: #fff;
  color: #55606a;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
}
#syncBtn:disabled{ opacity: .4; cursor: default; }
#syncBtn.spin{ animation: sbspin 1s linear infinite; }
@keyframes sbspin{ to{ transform: rotate(360deg); } }

/* ---- タイトル一覧 ---- */
#titleListWrap{
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding: 10px 12px 90px;
}
#titleList{
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 560px;
  margin: 0 auto;
}
.tl-item{
  display: flex;
  align-items: stretch;
  gap: 6px;
  background: #fff;
  border: 1px solid #dbe1e6;
  border-radius: 12px;
  padding: 10px 10px 10px 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.tl-main{
  flex: 1;
  min-width: 0;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  justify-content: center;
}
.tl-name{
  font-size: 14.5px;
  font-weight: 700;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tl-sub{
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: #8a939b;
}
.tl-chip{
  padding: 1.5px 8px;
  border-radius: 999px;
  font-size: 10.5px;
  border: 1px solid;
  white-space: nowrap;
}
.st-synced { color:#2f7d3d; border-color:#9ccba6; background:#eef8f0; }
.st-local  { color:#6b7580; border-color:#c2ccd4; background:#f2f5f7; }
.st-cloud  { color:#1c5f8f; border-color:#94c2e0; background:#ecf5fb; }
.st-pending{ color:#9a6a12; border-color:#dcbd7e; background:#fdf6e7; }
.st-newer  { color:#8a3a9d; border-color:#cf9edd; background:#f9effc; }
.tl-act{
  flex: none;
  width: 40px;
  border: none;
  background: none;
  color: #98a2ab;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
}
.tl-act:active{ background: #eef1f4; }
#titleEmpty{
  text-align: center;
  color: #8a939b;
  font-size: 13px;
  margin-top: 46px;
}
#titleViewFoot{
  position: fixed;
  left: 0; right: 0; bottom: 0;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
  pointer-events: none;
  background: linear-gradient(to top, #fafaf7ee 55%, transparent);
}
#newTitleBtn{
  pointer-events: auto;
  width: min(360px, 100%);
  padding: 12px 0;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 14.5px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 5px 18px rgba(74,144,217,.4);
}

/* Dropbox接続UI（ブリッジのDefaultUI用の最低限スタイル。
   ブリッジ付属CSSが読めない環境でも崩れないように自前で持つ） */
#dbxMount{ margin-left: auto; }
#dbxMount .sb-ui{ display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: #8a939b; }
#dbxMount .sb-status.sb-on{ color: #2f7d3d; }
#dbxMount .sb-connect-btn{
  border: 1px solid #c9d2d9; background: #fff; color: #55606a;
  border-radius: 8px; padding: 5px 10px; font-size: 12px;
  font-family: inherit; cursor: pointer; white-space: nowrap;
}
.sb-modal-overlay{
  position: fixed; inset: 0; background: rgba(30,36,42,.4);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; z-index: 130;
}
.sb-modal{
  background: #fff; border-radius: 12px; padding: 16px;
  width: min(420px, 100%); display: flex; flex-direction: column; gap: 10px;
  font-size: 13px;
}
.sb-appkey-input{
  padding: 8px 10px; border: 1px solid #c4ccd3; border-radius: 8px;
  font-size: 14px; font-family: inherit;
}
.sb-modal-actions{ display: flex; justify-content: flex-end; gap: 8px; }
.sb-modal-actions button{
  border: 1px solid #c4ccd3; background: #fff; color: #55606a;
  border-radius: 8px; padding: 7px 14px; font-size: 13px;
  font-family: inherit; cursor: pointer;
}

/* ---- 汎用ダイアログ（名前入力・競合） ---- */
.dialog{
  position: fixed; inset: 0;
  background: rgba(30,36,42,.38);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; z-index: 110;
}
.dialog[hidden]{ display: none; }
.dialog .card{
  background: #fff; border-radius: 13px;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
  width: min(440px, 100%);
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.dialog h2{ font-size: 14.5px; font-weight: 700; }
.dialog-desc{ font-size: 12.5px; line-height: 1.6; color: #55606a; }
.dialog-error{ font-size: 12px; color: var(--danger); }
#nameInput{
  padding: 9px 10px; border: 1px solid #c4ccd3; border-radius: 8px;
  font-size: 14px; font-family: inherit; outline-color: var(--accent);
}
.dialog .btns{ display: flex; justify-content: flex-end; gap: 8px; }
.dialog .btns.col{ flex-direction: column; align-items: stretch; }
.dialog .btns button{
  border-radius: 9px; padding: 9px 16px; font-size: 13px;
  font-family: inherit; cursor: pointer;
  border: 1px solid #c4ccd3; background: #fff; color: #55606a;
}
.dialog .btns button.primary{
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.dialog .btns button.quiet{ border: none; color: #98a2ab; }
.hint{ font-size: 11.5px; color: #8a939b; }
@media (max-width: 680px){ .hint{ display: none; } }

#saveIndicator{
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: #8a939b;
  white-space: nowrap;
}
#saveIndicator .dot{
  width: 8px; height: 8px; border-radius: 50%;
  background: #58b368;
}
#saveIndicator.saving .dot{ background: #e6a23c; animation: pulse 1s infinite; }
#saveIndicator.error .dot{ background: var(--danger); }
#saveIndicator.pending .dot{ background: #e6a23c; }
#saveIndicator.offline .dot{ background: #98a2ab; }
@keyframes pulse{ 50%{ opacity: .35; } }

/* ---- ボード ---- */
#scroller{
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
#boardWrap{
  position: relative;
  display: inline-block;
  padding: 18px 60px 60px 18px;
}
#grid{
  position: relative;
  background: #fff;
  border: 1px solid #c9d2d9;
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  /* サイズ・background-size は JS が設定 */
  touch-action: pan-x pan-y; /* スクロールは許可、ダブルタップズームは無効化 */
  user-select: none;
  -webkit-user-select: none;
}

/* ---- ブロック ---- */
.block{
  position: absolute;
  border-radius: 5px;
  border: 1.5px solid;
  box-shadow: 0 1px 2px rgba(0,0,0,.10);
  padding: 3px 5px;
  cursor: grab;
  z-index: 2;
  touch-action: pan-x pan-y; /* 長押し前の指の移動はスクロールとして扱う */
  user-select: none;
  -webkit-user-select: none;
  /* overflowは.block-body側でクリップ（マークバッジが角からはみ出すため） */
}
.block-body{
  max-height: 100%;
  overflow: hidden;
  pointer-events: none; /* タップ判定はブロック本体で行う */
}
.block-title{
  font-size: 11px;
  font-weight: 600;
  line-height: 1.3;
  word-break: break-word;
}
/* メモの冒頭をブロックの空きスペースに表示（入る分だけ。あふれはクリップ） */
.block-memo{
  font-size: 10px;
  line-height: 1.4;
  margin-top: 2px;
  opacity: .72;
  white-space: pre-wrap;
  word-break: break-word;
}
.block.selected{
  box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,.15);
  z-index: 3;
}
.block.dragging{
  opacity: .88;
  cursor: grabbing;
  box-shadow: 0 8px 20px rgba(0,0,0,.28);
  z-index: 20;
}
.block.invalid{
  box-shadow: 0 0 0 2.5px var(--danger), 0 8px 20px rgba(0,0,0,.25);
}
.block.settle{
  transition: left .13s ease-out, top .13s ease-out,
              width .13s ease-out, height .13s ease-out;
}

/* リサイズハンドル（選択中のみ） */
.handle{
  display: none;
  position: absolute;
  right: -8px; bottom: -8px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent);
  cursor: nwse-resize;
  touch-action: none;
  z-index: 21;
}
.block.selected .handle{ display: block; }

/* 配置可否ゴースト */
#ghost{
  position: absolute;
  border: 2px dashed #4f9e58;
  background: rgba(110, 200, 120, .16);
  border-radius: 6px;
  pointer-events: none;
  z-index: 6;
}
#ghost.invalid{
  border-color: var(--danger);
  background: rgba(220, 70, 70, .16);
}

/* タイトルのインライン編集 */
#titleInput{
  position: absolute;
  z-index: 30;
  font: 600 11px/1.3 inherit;
  font-family: inherit;
  color: var(--ink);
  border: 1.5px solid var(--accent);
  border-radius: 4px;
  padding: 2px 5px;
  background: #fff;
  outline: none;
}

/* ---- 行・列の追加/削除（端のホバーで現れる控えめなUI） ---- */
.edge-ctl{
  position: absolute;
  display: flex;
  gap: 6px;
  z-index: 8;
  opacity: .55;
  transition: opacity .15s;
}
#colCtl{ flex-direction: column; }
#rowCtl{ flex-direction: row; }
@media (hover: hover){
  .edge-ctl{ opacity: .18; }
  #boardWrap:hover .edge-ctl{ opacity: .85; }
  .edge-ctl:hover{ opacity: 1; }
}
.edge-ctl button{
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid #b8c2cb;
  background: #fff;
  color: #55606a;
  font-size: 17px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(0,0,0,.12);
}
.edge-ctl button:disabled{
  opacity: .3;
  cursor: default;
}

/* ---- ツールバー（画面下部固定・モバイル親指圏） ---- */
#toolbar{
  position: fixed;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  background: #fff;
  border: 1px solid #d4dade;
  border-radius: 16px;
  box-shadow: 0 6px 24px rgba(0,0,0,.18);
  z-index: 50;
  transition: transform .18s ease, opacity .18s ease;
  max-width: calc(100vw - 16px);
}
#toolbar.hidden{
  transform: translateX(-50%) translateY(150%);
  opacity: 0;
  pointer-events: none;
}
.swatch{
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid;
  cursor: pointer;
  flex: none;
  padding: 0;
}
.swatch.active{ box-shadow: 0 0 0 2.5px #444; }
#delBtn{
  margin-left: 10px;
  flex: none;
  border: 1px solid #e08a8a;
  background: #fff;
  color: var(--danger);
  border-radius: 9px;
  padding: 6px 13px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
#delBtn.armed{
  background: var(--danger);
  border-color: var(--danger);
  color: #fff;
}

/* ---- マーク（★/フラッグ）バッジ ---- */
.block-marks{
  position: absolute;
  top: -8px; left: -5px;
  font-size: 13px;
  line-height: 1;
  pointer-events: none;
  text-shadow: 0 1px 2px rgba(0,0,0,.3), 0 0 2px #fff;
  letter-spacing: 1px;
}
.mark-star{ color: #f0b400; }
.mark-flag{ color: #e04b3a; }

/* メモありインジケータ（ブロック右下の小さな点） */
.memo-dot{
  position: absolute;
  right: 3px; bottom: 3px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .4;
  pointer-events: none;
}

/* ---- メモポップオーバー ---- */
#memoPop{
  position: absolute;
  z-index: 40;
  width: max-content;
  max-width: min(280px, 78vw);
  background: #fffef6;
  border: 1px solid #ddd6b8;
  border-radius: 9px;
  box-shadow: 0 5px 18px rgba(0,0,0,.18);
  padding: 8px 10px;
}
#memoPop.readonly{ pointer-events: none; }
#memoPop .memo-text{
  font-size: 12.5px;
  line-height: 1.55;
  color: #4c4735;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 190px;
  overflow-y: auto;
}
#memoPop .memo-text:not([hidden]) + .memo-edit{
  margin-top: 7px;
}
#memoPop .memo-edit{
  border: 1px solid #c9d2d9;
  background: #fff;
  border-radius: 7px;
  padding: 4px 12px;
  font-size: 12px;
  font-family: inherit;
  color: #55606a;
  cursor: pointer;
}
#memoPop.readonly .memo-edit{ display: none; }

/* ---- メモ編集モーダル ----
 * 画面ほぼ全体を使うシート型。高さはdvh基準なのでソフトキーボード表示時は
 * その分縮み、テキストエリアが隠れない */
#memoModal{
  position: fixed;
  inset: 0;
  background: rgba(30, 36, 42, .38);
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 10px;
  z-index: 100;
  height: 100dvh;
}
#memoModal[hidden]{ display: none; }
#memoModal .card{
  background: #fff;
  border-radius: 13px;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
  width: min(720px, 100%);
  max-height: 100%;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#memoModal .card h2{
  font-size: 14px;
  font-weight: 700;
  word-break: break-word;
  flex: none;
}
#memoTa{
  width: 100%;
  flex: 1;
  min-height: 0;
  resize: none;
  font: 13px/1.6 inherit;
  font-family: inherit;
  padding: 9px 10px;
  border: 1px solid #c4ccd3;
  border-radius: 8px;
  outline-color: var(--accent);
}
#memoModal .btns{
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
#memoModal .btns button{
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid #c4ccd3;
  background: #fff;
  color: #55606a;
}
#memoModal #memoSave{
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ---- ツールバーの操作ボタン（マーク・メモ・コピー） ---- */
#toolbar{ flex-wrap: wrap; justify-content: center; }
.tbtn{
  height: 30px;
  min-width: 30px;
  padding: 0 8px;
  border-radius: 8px;
  border: 1px solid #c9d2d9;
  background: #fff;
  color: #7b858e;
  font-size: 14.5px;
  font-family: inherit;
  line-height: 1;
  cursor: pointer;
  flex: none;
}
.tbtn.active[data-mark="star"]{ color:#d99f00; border-color:#e6bb45; background:#fff8e2; }
.tbtn.active[data-mark="flag"]{ color:#d0402f; border-color:#e08a7d; background:#fdeeec; }
.tsep{
  width: 1px;
  height: 22px;
  background: #dde3e8;
  flex: none;
}

/* ---- コピー配置モードのヒント ---- */
#placeHint{
  position: fixed;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  background: #333a40;
  color: #fff;
  font-size: 12.5px;
  border-radius: 12px;
  padding: 9px 16px;
  box-shadow: 0 6px 24px rgba(0,0,0,.25);
  z-index: 60;
  white-space: nowrap;
}
.block.placing-preview{
  opacity: .75;
  pointer-events: none;
  z-index: 22;
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

/* ---- 色プリセット8色（方眼紙上で目に痛くない彩度 / 濃色文字） ---- */
.color-green    { background:#c9ecb4; border-color:#93c47d; color:#2b5e1d; }
.color-deepgreen{ background:#8cc498; border-color:#5a9e6f; color:#123c20; }
.color-yellow   { background:#f6ee9e; border-color:#d3bf4b; color:#655505; }
.color-cyan     { background:#b0ecf1; border-color:#67c3cd; color:#0d5a63; }
.color-blue     { background:#b3d6f5; border-color:#6fa8dc; color:#1c4e79; }
.color-magenta  { background:#f3b8dd; border-color:#d570b0; color:#7d1c5c; }
.color-orange   { background:#fbd6a2; border-color:#e0a25c; color:#754409; }
.color-gray     { background:#dce0e4; border-color:#a8b1b9; color:#39434c; }
</style>
</head>
<body>

<!-- ============ タイトル一覧ビュー ============ -->
<div id="titleView">
  <header>
    <h1>プロットボード</h1>
    <div id="dbxMount"></div>
  </header>
  <div id="titleListWrap">
    <ul id="titleList"></ul>
    <p id="titleEmpty" hidden>作品がありません。「＋ 新規作成」から始めてください。</p>
  </div>
  <div id="titleViewFoot">
    <button id="newTitleBtn" type="button">＋ 新規作成</button>
  </div>
</div>

<!-- ============ ボードビュー ============ -->
<div id="boardView" hidden>
<header>
  <button id="backBtn" type="button" title="作品一覧へ戻る">←</button>
  <h1 id="boardTitle">無題</h1>
  <span class="hint">空きマスをダブルクリック / ダブルタップでブロック作成。モバイルは長押しでドラッグ</span>
  <span id="saveIndicator"><span class="dot"></span><span id="saveText">保存済み</span></span>
  <button id="syncBtn" type="button" title="今すぐ同期" hidden>⟳</button>
</header>

<div id="scroller">
  <div id="boardWrap">
    <div id="grid">
      <div id="ghost" hidden></div>
      <input id="titleInput" hidden autocomplete="off" enterkeyhint="done" placeholder="タイトル">
      <div id="memoPop" hidden>
        <div class="memo-text"></div>
        <button class="memo-edit" type="button">メモを編集</button>
      </div>
    </div>
    <div id="colCtl" class="edge-ctl">
      <button id="colPlus"  title="列を追加" aria-label="列を追加">＋</button>
      <button id="colMinus" title="右端の列を削除" aria-label="右端の列を削除">−</button>
    </div>
    <div id="rowCtl" class="edge-ctl">
      <button id="rowPlus"  title="行を追加" aria-label="行を追加">＋</button>

  <!-- 色スウォッチはJSで生成 -->
  <span id="swatches" style="display:flex; gap:8px;"></span>

  <div class="card">

  <div class="card">
    <h2>別の端末での更新があります</h2>
    <p id="conflictDesc" class="dialog-desc"></p>

      <button id="conflictMine" type="button" class="primary">この端末の内容で上書き</button>
      <button id="conflictCloud" type="button">クラウドの内容を読み込む（この端末の変更は破棄）</button>
      <button id="conflictLater" type="button" class="quiet">あとで決める（同期を保留）</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
 * 実装方式メモ（指示書の要求により判断理由を記載）:
 * - vanilla JS を採用。単一ファイル・ノービルド制約下では JSX が使えず
 *   React は記述が煩雑になる上、ドラッグ中の高頻度更新は結局 DOM 直接
 *   操作（transform/left/top の書き換え）が必要で仮想DOMの恩恵が薄い。
 *   軽量方針（このアプリの生命線はドラッグの軽快さ）にも合致する。
 * - D&D は設計書どおり Pointer Events（pointerdown/move/up +
 *   setPointerCapture）で自前実装。TouchEvents/MouseEvents の二重実装は
 *   しない。唯一の例外として、ドラッグ確定後にブラウザのネイティブ
 *   スクロールが割り込むのを防ぐため、非passiveな touchmove リスナで
 *   preventDefault() だけ行う（ロジックは持たない）。
 * ============================================================ */

/* ---------- 定数 ---------- */
const COLOR_IDS = ['green','deepgreen','yellow','cyan','blue','magenta','orange','gray'];
const COLOR_LABELS = {
  green:'緑', deepgreen:'深緑', yellow:'黄', cyan:'シアン',
  blue:'青', magenta:'マゼンタ', orange:'オレンジ', gray:'グレー'
};
const CELL_MIN = 22, CELL_MAX = 48;   // マスの実サイズ範囲(px)。旧値の半分（縦横半分＝面積1/4）
const MAX_COLS = 60, MAX_ROWS = 60;
const LONG_PRESS_MS = 300;            // モバイル長押しドラッグ開始
const DRAG_START_PX = 4;              // マウスのドラッグ開始しきい値
const LP_CANCEL_PX  = 10;             // 長押し前にこの距離動いたらスクロール扱い
const TAP_DOUBLE_MS = 350, TAP_DOUBLE_PX = 28; // ダブルタップ判定
const SAVE_DEBOUNCE_MS = 1200;
// 編集後のDropboxアップロードまでの間隔（テストから短縮できるようフック付き）
const CLOUD_DEBOUNCE_MS = window.__PB_CLOUD_DEBOUNCE ?? 20000;
const NAME_FORBIDDEN = /[\\/:?*"<>|]/; // Dropboxのパス禁止文字

// 端末識別子（JSONのdeviceフィールド用）
const deviceId = (() => {
  let d = localStorage.getItem('pb_device');
  if (!d){
    d = 'dev-' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('pb_device', d);
  }
  return d;
})();

/* ---------- データモデル ---------- */
function genId(){ return 'blk-' + Math.random().toString(36).slice(2, 10); }

function newDoc(name){
  // 縦長デフォルト（モバイル配慮の縦長ファースト方針。以降のUIも縦長を優先して設計する）
  return {
    version: 1,
    title: name || '無題',
    updatedAt: null,  // ISO文字列。保存のたびに更新
    device: null,     // 最終更新した端末の識別子
    boards: [{ id: 'board-1', grid: { cols: 6, rows: 12 }, blocks: [] }]
  };
}
function newBlock(x, y){
  // memo / marks / thumb は Phase 1 では未使用だがデータとして保持する
  return { id: genId(), x, y, w: 1, h: 1,
           title: '', color: 'green', memo: '', marks: [], thumb: null };
}
// 復元データの欠損フィールドを補う（将来フィールド追加時の前方互換も兼ねる）
function normalizeDoc(d){
  if (!d || !Array.isArray(d.boards) || !d.boards[0]) return newDoc();
  d.version = 1;
  d.title = typeof d.title === 'string' ? d.title : '無題';
  d.updatedAt = typeof d.updatedAt === 'string' ? d.updatedAt : null;
  d.device = typeof d.device === 'string' ? d.device : null;
  const bd = d.boards[0];
  if (!bd.grid || !(bd.grid.cols >= 1) || !(bd.grid.rows >= 1)) bd.grid = { cols: 6, rows: 12 };
  bd.grid.cols = Math.min(MAX_COLS, Math.floor(bd.grid.cols));
  bd.grid.rows = Math.min(MAX_ROWS, Math.floor(bd.grid.rows));
  bd.blocks = (Array.isArray(bd.blocks) ? bd.blocks : []).map(b => ({
    id: b.id || genId(),
    x: Math.max(0, b.x|0), y: Math.max(0, b.y|0),
    w: Math.max(1, b.w|0), h: Math.max(1, b.h|0),
    title: typeof b.title === 'string' ? b.title : '',
    color: COLOR_IDS.includes(b.color) ? b.color : 'green',
    memo: typeof b.memo === 'string' ? b.memo : '',
    marks: Array.isArray(b.marks) ? b.marks : [],
    thumb: b.thumb ?? null
  }));
  return d;
}

/* ---------- 状態 ---------- */
const state = {
  doc: newDoc(),
  currentName: null, // 開いている作品名（titlesストアのキー）
  rec: null,         // 現在の作品レコード { name, doc, rev, dirty, updatedAt, syncedAt }
  selectedId: null,
  pending: null,   // pointerdown 済み・ドラッグ未確定のセッション
  drag: null,      // 移動ドラッグ中
  resize: null,    // リサイズ中
  editing: null,   // タイトル編集中 { id }
  memoEdit: null,  // メモ編集モーダル表示中 { id }
  placing: null,   // コピーの配置先選択中 { proto, gx, gy, valid }
  hoverId: null    // マウスホバー中のブロック（メモポップオーバー用）
};
let cell = 64;     // 1マスのpxサイズ（renderAllで再計算）
window.__plotboard = state; // 動作確認・デバッグ用フック

const board  = () => state.doc.boards[0];
const blocks = () => board().blocks;
const getBlock = id => blocks().find(b => b.id === id);

/* ---------- DOM参照 ---------- */
const $ = id => document.getElementById(id);
const scroller = $('scroller'), boardWrap = $('boardWrap'), gridEl = $('grid');
const ghostEl = $('ghost'), titleInput = $('titleInput');
const toolbarEl = $('toolbar'), swatchesEl = $('swatches'), delBtn = $('delBtn');
const starBtn = $('starBtn'), flagBtn = $('flagBtn');
const memoBtn = $('memoBtn'), copyBtn = $('copyBtn');
const memoPop = $('memoPop'), memoModal = $('memoModal'), memoTa = $('memoTa');
const placeHint = $('placeHint');
const titleView = $('titleView'), boardView = $('boardView');
const titleListEl = $('titleList'), boardTitleEl = $('boardTitle');
const backBtn = $('backBtn'), syncBtn = $('syncBtn'), newTitleBtn = $('newTitleBtn');
const nameModal = $('nameModal'), nameInput = $('nameInput'), nameError = $('nameError');
const conflictModal = $('conflictModal');
const saveIndicator = $('saveIndicator'), saveText = $('saveText');
const colPlus = $('colPlus'), colMinus = $('colMinus');
const rowPlus = $('rowPlus'), rowMinus = $('rowMinus');
const blockEls = new Map(); // id -> element

/* ---------- IndexedDB 保存 ----------
 * v2: 複数作品対応。'titles'ストアに作品名をキーとしてレコードを保存。
 * 旧'docs'ストア(単一ボード)はマイグレーション後もそのまま残す（消さない） */
const DB_NAME = 'plotboard', DB_STORE = 'docs', DB_TITLES = 'titles', DB_KEY = 'current';
let dbPromise = null;
function openDB(){
  if (!dbPromise){
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 2);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
        if (!db.objectStoreNames.contains(DB_TITLES)) db.createObjectStore(DB_TITLES);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  return dbPromise;
}
function idbReq(req){
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbLegacyLoad(){ // 旧形式(Phase 2まで)の単一ボードデータ
  const db = await openDB();
  return idbReq(db.transaction(DB_STORE).objectStore(DB_STORE).get(DB_KEY)).then(r => r || null);
}
async function idbTitleGet(name){
  const db = await openDB();
  return idbReq(db.transaction(DB_TITLES).objectStore(DB_TITLES).get(name)).then(r => r || null);
}
async function idbTitlePut(rec){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_TITLES, 'readwrite');
    tx.objectStore(DB_TITLES).put(JSON.parse(JSON.stringify(rec)), rec.name);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function idbTitleDelete(name){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_TITLES, 'readwrite');
    tx.objectStore(DB_TITLES).delete(name);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function idbTitlesAll(){
  const db = await openDB();
  return idbReq(db.transaction(DB_TITLES).objectStore(DB_TITLES).getAll()).then(r => r || []);
}

/* ---------- ローカル保存（一次ストレージ）と同期インジケータ ---------- */
let saveTimer = null;
function setIndicator(cls, text){
  saveIndicator.className = cls;
  saveText.textContent = text;
}
// 保存/同期の状態を1つのインジケータに集約して表示
function updateSyncUI(){
  if (saveTimer)                setIndicator('saving', '保存中…');
  else if (conflictPending)     setIndicator('error', '競合');
  else if (cloudBusy)           setIndicator('saving', '同期中…');
  else if (!canCloud())         setIndicator('', 'ローカル保存済み');
  else if (!navigator.onLine)   setIndicator('offline', 'オフライン');
  else if (state.rec?.dirty)    setIndicator('pending', '同期待ち');
  else                          setIndicator('', 'クラウド同期済み');
  syncBtn.hidden = !bridgeAvailable;
  syncBtn.disabled = !canCloud() || cloudBusy;
  syncBtn.classList.toggle('spin', cloudBusy);
}
function scheduleSave(){
  if (!state.rec) return;
  const now = new Date().toISOString();
  state.doc.updatedAt = now;
  state.doc.device = deviceId;
  state.rec.dirty = true;
  state.rec.updatedAt = now;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, SAVE_DEBOUNCE_MS);
  scheduleCloudUpload();
  updateSyncUI();
}
async function flushSave(){
  clearTimeout(saveTimer); saveTimer = null;
  if (!state.rec){ updateSyncUI(); return; }
  try{
    await idbTitlePut(state.rec);
  }catch(err){
    console.error('保存に失敗:', err);
    setIndicator('error', '保存エラー');
    return;
  }
  updateSyncUI();
}
// タブを閉じる/裏に回る前に未保存分の書き込みとアップロードをフラッシュ（モバイルで重要）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'hidden') return;
  if (saveTimer) flushSave();
  if (state.rec?.dirty) syncNow();
});

/* ---------- 幾何・配置判定 ---------- */
function rectsOverlap(a, b){
  return a.x < b.x + b.w && b.x < a.x + a.w &&
         a.y < b.y + b.h && b.y < a.y + a.h;
}
function placementValid(x, y, w, h, ignoreId){
  const g = board().grid;
  if (x < 0 || y < 0 || x + w > g.cols || y + h > g.rows) return false;
  return !blocks().some(b => b.id !== ignoreId && rectsOverlap({x, y, w, h}, b));
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ---------- レンダリング ---------- */
function computeCell(){
  // 画面幅に合わせてスケール。収まらない場合は横スクロール（マスは正方形固定）
  const avail = scroller.clientWidth - 18 - 60 - 4; // boardWrapのpadding分
  return clamp(Math.floor(avail / board().grid.cols), CELL_MIN, CELL_MAX);
}

function renderAll(){
  cancelPlacing(); // 構造変更・リサイズ時は配置モードを解除
  cell = computeCell();
  const g = board().grid;
  const gw = g.cols * cell, gh = g.rows * cell;
  gridEl.style.width = gw + 'px';
  gridEl.style.height = gh + 'px';
  gridEl.style.backgroundSize = `${cell}px ${cell}px`;

  // ブロック再構築
  for (const el of blockEls.values()) el.remove();
  blockEls.clear();
  for (const b of blocks()){
    const el = makeBlockEl(b.id);
    blockEls.set(b.id, el);
    layoutBlock(b);
    gridEl.appendChild(el);
  }

  // 列コントロールは右端の垂直中央、行コントロールは下端の左寄せ
  // （下端中央だと画面下部固定ツールバーと重なるため左寄せにする）
  const ctlH = 30 * 2 + 6;
  $('colCtl').style.top  = (18 + Math.max(0, gh / 2 - ctlH / 2)) + 'px';
  $('colCtl').style.right = '14px';
  $('rowCtl').style.left = '18px';
  $('rowCtl').style.bottom = '14px';

  updateEdgeControls();
  updateToolbar();
  updateMemoPop();
}

function makeBlockEl(id){
  const el = document.createElement('div');
  el.dataset.id = id;
  const body = document.createElement('div');
  body.className = 'block-body';
  const title = document.createElement('div');
  title.className = 'block-title';
  const memo = document.createElement('div');
  memo.className = 'block-memo';
  body.append(title, memo);
  const marks = document.createElement('div');
  marks.className = 'block-marks';
  const dot = document.createElement('div');
  dot.className = 'memo-dot';
  const handle = document.createElement('div');
  handle.className = 'handle';
  el.append(body, marks, dot, handle);
  el.addEventListener('pointerdown', onBlockPointerDown);
  handle.addEventListener('pointerdown', onHandlePointerDown);
  // PC: カーソルを合わせるとメモがポップオーバー表示
  el.addEventListener('pointerenter', e => {
    if (e.pointerType !== 'mouse') return;
    state.hoverId = id;
    updateMemoPop();
  });
  el.addEventListener('pointerleave', e => {
    if (e.pointerType !== 'mouse') return;
    if (state.hoverId === id) state.hoverId = null;
    updateMemoPop();
  });
  return el;
}

function layoutBlock(b){
  const el = blockEls.get(b.id);
  if (!el) return;
  el.className = 'block color-' + b.color +
    (state.selectedId === b.id ? ' selected' : '');
  el.style.left = (b.x * cell + 2) + 'px';
  el.style.top = (b.y * cell + 2) + 'px';
  el.style.width = (b.w * cell - 4) + 'px';
  el.style.height = (b.h * cell - 4) + 'px';
  el.querySelector('.block-title').textContent = b.title;
  // メモ冒頭をブロックの空きスペースに表示（あふれた分はクリップ）
  el.querySelector('.block-memo').textContent = b.memo;
  // マーク（★/フラッグ）バッジ
  const marksEl = el.querySelector('.block-marks');
  marksEl.textContent = '';
  for (const m of b.marks){
    const s = document.createElement('span');
    if (m === 'star'){ s.className = 'mark-star'; s.textContent = '★'; }
    else if (m === 'flag'){ s.className = 'mark-flag'; s.textContent = '⚑'; }
    else continue;
    marksEl.appendChild(s);
  }
  // メモありインジケータ
  el.querySelector('.memo-dot').hidden = !b.memo;
}

/* ---------- 選択・ツールバー ---------- */
function select(id){
  if (state.selectedId === id) return;
  const prev = state.selectedId;
  state.selectedId = id;
  if (prev){ const pb = getBlock(prev); if (pb) layoutBlock(pb); }
  if (id){ const b = getBlock(id); if (b) layoutBlock(b); }
  disarmDelete();
  updateToolbar();
  updateMemoPop();
}
function deselect(){ select(null); }

for (const c of COLOR_IDS){
  const btn = document.createElement('button');
  btn.className = 'swatch color-' + c;
  btn.title = COLOR_LABELS[c];
  btn.addEventListener('click', () => {
    const b = getBlock(state.selectedId);
    if (!b) return;
    b.color = c;
    layoutBlock(b);
    updateToolbar();
    scheduleSave();
  });
  btn.dataset.color = c;
  swatchesEl.appendChild(btn);
}

function updateToolbar(){
  const b = getBlock(state.selectedId);
  toolbarEl.classList.toggle('hidden', !b);
  if (!b) return;
  for (const s of swatchesEl.children){
    s.classList.toggle('active', s.dataset.color === b.color);
  }
  starBtn.classList.toggle('active', b.marks.includes('star'));
  flagBtn.classList.toggle('active', b.marks.includes('flag'));
}

/* ---------- マーク（★/フラッグ） ---------- */
function toggleMark(kind){
  const b = getBlock(state.selectedId);
  if (!b) return;
  const i = b.marks.indexOf(kind);
  if (i >= 0) b.marks.splice(i, 1);
  else b.marks.push(kind);
  layoutBlock(b);
  updateToolbar();
  scheduleSave();
}
starBtn.addEventListener('click', () => toggleMark('star'));
flagBtn.addEventListener('click', () => toggleMark('flag'));

/* ---------- メモ ----------
 * PC: ホバーでポップオーバー表示（読み取り専用）
 * 選択中: ポップオーバー + 編集ボタン、ツールバーの「メモ」からも編集
 * 編集はモーダル（テキストエリアのみのシンプル構成・リッチエディタなし） */
function updateMemoPop(){
  const targetId = state.hoverId || state.selectedId;
  const b = targetId ? getBlock(targetId) : null;
  const readonly = !!b && targetId !== state.selectedId;
  // ホバー（読み取り専用）はメモがある時だけ。選択中はメモが無くても
  // 「メモを編集」ボタンを出すため常に表示する
  if (!b || state.drag || state.resize || state.placing ||
      state.editing || state.memoEdit || (readonly && !b.memo)){
    memoPop.hidden = true;
    return;
  }
  memoPop.classList.toggle('readonly', readonly);
  const textEl = memoPop.querySelector('.memo-text');
  textEl.textContent = b.memo;
  textEl.hidden = !b.memo;
  memoPop.dataset.id = b.id;
  memoPop.hidden = false;
  // ブロックの上に表示。入らなければ下に
  const g = board().grid;
  const left = clamp(b.x * cell, 0, Math.max(0, g.cols * cell - memoPop.offsetWidth - 4));
  let top = b.y * cell - memoPop.offsetHeight - 9;
  if (top < 2) top = (b.y + b.h) * cell + 9;
  memoPop.style.left = left + 'px';
  memoPop.style.top = top + 'px';
}
memoPop.addEventListener('pointerdown', e => e.stopPropagation());
memoPop.querySelector('.memo-edit').addEventListener('click', () => {
  openMemoModal(memoPop.dataset.id);
});
memoBtn.addEventListener('click', () => openMemoModal(state.selectedId));

function openMemoModal(id){
  const b = getBlock(id);
  if (!b) return;
  state.memoEdit = { id };
  $('memoModalTitle').textContent = 'メモ: ' + (b.title || '無題');
  memoTa.value = b.memo;
  memoModal.hidden = false;
  updateMemoPop();
  memoTa.focus();
}
function closeMemoModal(save){
  if (memoModal.hidden) return;
  const ed = state.memoEdit;
  state.memoEdit = null;
  memoModal.hidden = true;
  if (save && ed){
    const b = getBlock(ed.id);
    if (b && b.memo !== memoTa.value){
      b.memo = memoTa.value;
      layoutBlock(b);
      scheduleSave();
    }
  }
  updateMemoPop();
}
$('memoSave').addEventListener('click', () => closeMemoModal(true));
$('memoCancel').addEventListener('click', () => closeMemoModal(false));
memoModal.addEventListener('pointerdown', e => {
  if (e.target === memoModal) closeMemoModal(false); // 背景タップで閉じる
});
memoTa.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Escape') closeMemoModal(false);
  else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) closeMemoModal(true);
});

/* ---------- コピー（複製直後は配置先選択モード） ---------- */
let placingEl = null;
copyBtn.addEventListener('click', () => {
  const src = getBlock(state.selectedId);
  if (!src || state.placing) return;
  const proto = JSON.parse(JSON.stringify(src)); // メモ・色・マーク込みで複製
  proto.id = genId();
  deselect();
  state.placing = { proto, gx: proto.x, gy: proto.y, valid: false };
  placingEl = document.createElement('div');
  placingEl.className = 'block placing-preview color-' + proto.color;
  const pbody = document.createElement('div');
  pbody.className = 'block-body';
  const t = document.createElement('div');
  t.className = 'block-title';
  t.textContent = proto.title;
  const pm = document.createElement('div');
  pm.className = 'block-memo';
  pm.textContent = proto.memo;
  pbody.append(t, pm);
  placingEl.appendChild(pbody);
  placingEl.style.left = (proto.x * cell + 2) + 'px';
  placingEl.style.top = (proto.y * cell + 2) + 'px';
  placingEl.style.width = (proto.w * cell - 4) + 'px';
  placingEl.style.height = (proto.h * cell - 4) + 'px';
  gridEl.appendChild(placingEl);
  showGhost(proto.x, proto.y, proto.w, proto.h, false); // 元位置は埋まっているので赤
  placeHint.hidden = false;
  updateMemoPop();
});

function movePlacing(clientX, clientY){
  const p = state.placing;
  if (!p) return;
  const gr = gridEl.getBoundingClientRect();
  const g = board().grid;
  const gx = clamp(Math.round((clientX - gr.left) / cell - p.proto.w / 2), 0, g.cols - p.proto.w);
  const gy = clamp(Math.round((clientY - gr.top) / cell - p.proto.h / 2), 0, g.rows - p.proto.h);
  p.gx = gx; p.gy = gy;
  p.valid = placementValid(gx, gy, p.proto.w, p.proto.h, null);
  placingEl.style.left = (gx * cell + 2) + 'px';
  placingEl.style.top = (gy * cell + 2) + 'px';
  showGhost(gx, gy, p.proto.w, p.proto.h, p.valid);
}

function cancelPlacing(){
  if (!state.placing) return;
  state.placing = null;
  placingEl?.remove();
  placingEl = null;
  hideGhost();
  placeHint.hidden = true;
}

function finishPlacing(e){
  const p = state.placing;
  const gr = gridEl.getBoundingClientRect();
  const inside = e.clientX >= gr.left - 8 && e.clientX <= gr.right + 8 &&
                 e.clientY >= gr.top - 8 && e.clientY <= gr.bottom + 8;
  if (!inside){ cancelPlacing(); return; } // グリッド外タップで中止
  movePlacing(e.clientX, e.clientY);
  if (!p.valid) return; // 置けない位置 → 赤表示のままモード継続
  const nb = { ...p.proto, x: p.gx, y: p.gy };
  cancelPlacing();
  blocks().push(nb);
  const el = makeBlockEl(nb.id);
  blockEls.set(nb.id, el);
  gridEl.appendChild(el);
  layoutBlock(nb);
  select(nb.id);
  updateEdgeControls();
  scheduleSave();
}

/* 削除は undo が無いため2度押し方式（誤削除防止） */
let delArmTimer = null;
function disarmDelete(){
  clearTimeout(delArmTimer); delArmTimer = null;
  delBtn.classList.remove('armed');
  delBtn.textContent = '削除';
}
delBtn.addEventListener('click', () => {
  const b = getBlock(state.selectedId);
  if (!b) return;
  if (!delBtn.classList.contains('armed')){
    delBtn.classList.add('armed');
    delBtn.textContent = '本当に削除？';
    delArmTimer = setTimeout(disarmDelete, 2500);
    return;
  }
  disarmDelete();
  const i = blocks().indexOf(b);
  if (i >= 0) blocks().splice(i, 1);
  blockEls.get(b.id)?.remove();
  blockEls.delete(b.id);
  state.selectedId = null;
  if (state.hoverId === b.id) state.hoverId = null;
  updateToolbar();
  updateEdgeControls();
  updateMemoPop();
  scheduleSave();
});

/* ---------- 行・列の追加/削除 ---------- */
function updateEdgeControls(){
  const g = board().grid;
  const lastColUsed = blocks().some(b => b.x + b.w >= g.cols);
  const lastRowUsed = blocks().some(b => b.y + b.h >= g.rows);
  colPlus.disabled = g.cols >= MAX_COLS;
  rowPlus.disabled = g.rows >= MAX_ROWS;
  colMinus.disabled = g.cols <= 1 || lastColUsed;
  rowMinus.disabled = g.rows <= 1 || lastRowUsed;
  colMinus.title = colMinus.disabled && lastColUsed
    ? 'ブロックが載っている列は削除できません' : '右端の列を削除';
  rowMinus.title = rowMinus.disabled && lastRowUsed
    ? 'ブロックが載っている行は削除できません' : '下端の行を削除';
}
colPlus.addEventListener('click', () => { board().grid.cols++; renderAll(); scheduleSave(); });
rowPlus.addEventListener('click', () => { board().grid.rows++; renderAll(); scheduleSave(); });
colMinus.addEventListener('click', () => {
  if (colMinus.disabled) return;
  board().grid.cols--; renderAll(); scheduleSave();
});
rowMinus.addEventListener('click', () => {
  if (rowMinus.disabled) return;
  board().grid.rows--; renderAll(); scheduleSave();
});

/* ---------- ゴースト（配置可否のリアルタイム表示） ---------- */
function showGhost(x, y, w, h, valid){
  ghostEl.hidden = false;
  ghostEl.classList.toggle('invalid', !valid);
  ghostEl.style.left = (x * cell + 1) + 'px';
  ghostEl.style.top = (y * cell + 1) + 'px';
  ghostEl.style.width = (w * cell - 2) + 'px';
  ghostEl.style.height = (h * cell - 2) + 'px';
}
function hideGhost(){ ghostEl.hidden = true; }

/* ---------- ブロックのドラッグ移動 ---------- */
function onBlockPointerDown(e){
  if (state.drag || state.resize || state.pending || state.placing) return;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  const id = e.currentTarget.dataset.id;
  commitTitleEdit();
  const rect = e.currentTarget.getBoundingClientRect();
  const s = {
    id,
    pointerId: e.pointerId,
    isTouch: e.pointerType !== 'mouse',
    startX: e.clientX, startY: e.clientY,
    grabDX: e.clientX - rect.left,
    grabDY: e.clientY - rect.top,
    lpTimer: null
  };
  state.pending = s;
  if (s.isTouch){
    // 長押しでドラッグモード開始。それまでの指の移動はスクロールに委ねる
    s.lpTimer = setTimeout(() => {
      if (state.pending === s) startDrag(s);
    }, LONG_PRESS_MS);
  }
}

function startDrag(s){
  state.pending = null;
  const b = getBlock(s.id);
  const el = blockEls.get(s.id);
  if (!b || !el) return;
  state.drag = {
    id: s.id, pointerId: s.pointerId,
    grabDX: s.grabDX, grabDY: s.grabDY,
    gx: b.x, gy: b.y, valid: true, moved: false
  };
  try{ el.setPointerCapture(s.pointerId); }catch(_){}
  el.classList.add('dragging');
  select(s.id);
  updateMemoPop(); // ドラッグ中はポップオーバーを隠す
  showGhost(b.x, b.y, b.w, b.h, true);
  if (navigator.vibrate) navigator.vibrate(10);
}

function dragMove(e){
  const d = state.drag;
  const b = getBlock(d.id), el = blockEls.get(d.id);
  if (!b || !el) return;
  const gr = gridEl.getBoundingClientRect();
  const px = e.clientX - gr.left - d.grabDX;
  const py = e.clientY - gr.top - d.grabDY;
  el.style.left = px + 'px';
  el.style.top = py + 'px';
  const g = board().grid;
  const gx = clamp(Math.round((px - 2) / cell), 0, g.cols - b.w);
  const gy = clamp(Math.round((py - 2) / cell), 0, g.rows - b.h);
  d.moved = true;
  if (gx !== d.gx || gy !== d.gy || d.valid === null){
    d.gx = gx; d.gy = gy;
    d.valid = placementValid(gx, gy, b.w, b.h, b.id);
    showGhost(gx, gy, b.w, b.h, d.valid);
    el.classList.toggle('invalid', !d.valid);
  }
}

function endDrag(cancelled){
  const d = state.drag;
  if (!d) return;
  state.drag = null;
  const b = getBlock(d.id), el = blockEls.get(d.id);
  hideGhost();
  if (!b || !el) return;
  try{ el.releasePointerCapture(d.pointerId); }catch(_){}
  el.classList.remove('dragging', 'invalid');
  if (!cancelled && d.moved && d.valid && (d.gx !== b.x || d.gy !== b.y)){
    b.x = d.gx; b.y = d.gy;
    scheduleSave();
  }
  // 確定位置（不可なら元位置）へスナップして戻す
  el.classList.add('settle');
  layoutBlock(b);
  setTimeout(() => el.classList.remove('settle'), 160);
  updateEdgeControls();
  updateMemoPop();
}

/* ---------- リサイズ（右下ハンドル） ---------- */
function onHandlePointerDown(e){
  if (state.drag || state.resize) return;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  e.stopPropagation();
  const id = e.currentTarget.parentElement.dataset.id;
  const b = getBlock(id);
  if (!b) return;
  commitTitleEdit();
  state.resize = { id, pointerId: e.pointerId, w: b.w, h: b.h, valid: true, moved: false };
  try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
  updateMemoPop();
  showGhost(b.x, b.y, b.w, b.h, true);
}

function resizeMove(e){
  const r = state.resize;
  const b = getBlock(r.id), el = blockEls.get(r.id);
  if (!b || !el) return;
  const gr = gridEl.getBoundingClientRect();
  const g = board().grid;
  const w = clamp(Math.round((e.clientX - gr.left - b.x * cell) / cell), 1, g.cols - b.x);
  const h = clamp(Math.round((e.clientY - gr.top - b.y * cell) / cell), 1, g.rows - b.y);
  if (w !== r.w || h !== r.h){
    r.w = w; r.h = h; r.moved = true;
    r.valid = placementValid(b.x, b.y, w, h, b.id);
    showGhost(b.x, b.y, w, h, r.valid);
    el.classList.toggle('invalid', !r.valid);
    el.style.width = (w * cell - 4) + 'px';
    el.style.height = (h * cell - 4) + 'px';
  }
}

function endResize(cancelled){
  const r = state.resize;
  if (!r) return;
  state.resize = null;
  const b = getBlock(r.id), el = blockEls.get(r.id);
  hideGhost();
  if (!b || !el) return;
  el.classList.remove('invalid');
  if (!cancelled && r.moved && r.valid && (r.w !== b.w || r.h !== b.h)){
    b.w = r.w; b.h = r.h;
    scheduleSave();
  }
  el.classList.add('settle');
  layoutBlock(b);
  setTimeout(() => el.classList.remove('settle'), 160);
  updateEdgeControls();
  updateMemoPop();
}

/* ---------- ポインタの共通ハンドラ ---------- */
window.addEventListener('pointermove', e => {
  if (state.placing){ movePlacing(e.clientX, e.clientY); return; }
  if (state.resize && e.pointerId === state.resize.pointerId){ resizeMove(e); return; }
  if (state.drag && e.pointerId === state.drag.pointerId){ dragMove(e); return; }
  const s = state.pending;
  if (s && e.pointerId === s.pointerId){
    const dist = Math.hypot(e.clientX - s.startX, e.clientY - s.startY);
    if (s.isTouch){
      // 長押し成立前に動いた → スクロール操作。ドラッグは開始しない
      if (dist > LP_CANCEL_PX){ clearTimeout(s.lpTimer); state.pending = null; }
    } else if (dist > DRAG_START_PX){
      startDrag(s);
      dragMove(e);
    }
  }
});

window.addEventListener('pointerup', e => {
  if (state.placing){ finishPlacing(e); return; }
  if (state.resize && e.pointerId === state.resize.pointerId){ endResize(false); return; }
  if (state.drag && e.pointerId === state.drag.pointerId){ endDrag(false); return; }
  const s = state.pending;
  if (s && e.pointerId === s.pointerId){
    clearTimeout(s.lpTimer);
    state.pending = null;
    // ドラッグに至らないタップ/クリック → 選択。選択済みならタイトル編集
    const wasSelected = state.selectedId === s.id;
    select(s.id);
    if (wasSelected) startTitleEdit(s.id);
  }
});

window.addEventListener('pointercancel', e => {
  if (state.resize && e.pointerId === state.resize.pointerId) endResize(true);
  if (state.drag && e.pointerId === state.drag.pointerId) endDrag(true);
  const s = state.pending;
  if (s && e.pointerId === s.pointerId){
    clearTimeout(s.lpTimer);
    state.pending = null;
  }
});

// ドラッグ/リサイズ/コピー配置の確定後にネイティブスクロールが割り込むのを防ぐ
window.addEventListener('touchmove', e => {
  if (state.drag || state.resize || state.placing) e.preventDefault();
}, { passive: false });

// タッチ長押しのコンテキストメニューを抑止
boardWrap.addEventListener('contextmenu', e => e.preventDefault());

/* ---------- 空きマスのダブルクリック/ダブルタップで新規作成 ---------- */
let lastTap = null;
gridEl.addEventListener('pointerup', e => {
  if (e.target !== gridEl) return;
  if (state.drag || state.resize || state.placing) return;
  const now = performance.now();
  if (lastTap && now - lastTap.t < TAP_DOUBLE_MS &&
      Math.hypot(e.clientX - lastTap.x, e.clientY - lastTap.y) < TAP_DOUBLE_PX){
    lastTap = null;
    createBlockAt(e.clientX, e.clientY);
  } else {
    lastTap = { t: now, x: e.clientX, y: e.clientY };
    commitTitleEdit();
    deselect();
  }
});

function createBlockAt(clientX, clientY){
  const gr = gridEl.getBoundingClientRect();
  const g = board().grid;
  const gx = clamp(Math.floor((clientX - gr.left) / cell), 0, g.cols - 1);
  const gy = clamp(Math.floor((clientY - gr.top) / cell), 0, g.rows - 1);
  if (!placementValid(gx, gy, 1, 1, null)){
    // 置けない位置は赤ゴーストを一瞬見せて知らせる
    showGhost(gx, gy, 1, 1, false);
    setTimeout(hideGhost, 350);
    return;
  }
  const b = newBlock(gx, gy);
  blocks().push(b);
  const el = makeBlockEl(b.id);
  blockEls.set(b.id, el);
  gridEl.appendChild(el);
  layoutBlock(b);
  select(b.id);
  updateEdgeControls();
  scheduleSave();
  startTitleEdit(b.id); // 生成直後にタイトル入力状態へ
}

/* ---------- タイトルのインライン編集 ---------- */
function startTitleEdit(id){
  const b = getBlock(id);
  if (!b) return;
  state.editing = { id };
  titleInput.value = b.title;
  // マスが小さくても入力できる最小幅を確保（グリッド内に収める）
  const g = board().grid;
  const width = Math.max(120, b.w * cell - 8);
  const left = clamp(b.x * cell + 4, 0, Math.max(0, g.cols * cell - width - 4));
  titleInput.style.left = left + 'px';
  titleInput.style.top = (b.y * cell + 4) + 'px';
  titleInput.style.width = width + 'px';
  titleInput.hidden = false;
  titleInput.focus();
  titleInput.select();
  updateMemoPop();
}
function commitTitleEdit(){
  if (!state.editing) return;
  const b = getBlock(state.editing.id);
  state.editing = null;
  titleInput.hidden = true;
  if (b && b.title !== titleInput.value.trim()){
    b.title = titleInput.value.trim();
    layoutBlock(b);
    scheduleSave();
  }
  updateMemoPop();
}
function cancelTitleEdit(){
  state.editing = null;
  titleInput.hidden = true;
  updateMemoPop();
}
titleInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') commitTitleEdit();
  else if (e.key === 'Escape') cancelTitleEdit();
});
titleInput.addEventListener('blur', commitTitleEdit);
titleInput.addEventListener('pointerdown', e => e.stopPropagation());

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (state.memoEdit) closeMemoModal(false);
  else if (state.placing) cancelPlacing();
  else if (!state.editing) deselect();
});

/* ---------- リサイズ・回転対応 ---------- */
let resizeRaf = null;
window.addEventListener('resize', () => {
  if (boardView.hidden) return;
  cancelAnimationFrame(resizeRaf);
  resizeRaf = requestAnimationFrame(renderAll);
});

/* ============================================================
 * Phase 3: Dropbox同期（ストレージブリッジ経由・無改造で利用）
 * - ローカル(IndexedDB)が常に一次ストレージ。クラウドはLast-Write-Wins
 * - revベースの競合検知。自動マージはしない（軽量方針）
 * ============================================================ */
const bridgeAvailable = !!window.__PB_TEST_BRIDGE || typeof StorageBridge !== 'undefined';
let storage = null;
let cloudBusy = false;        // アップロード/ダウンロード実行中
let cloudTimer = null;        // アップロードのデバウンスタイマー
let conflictPending = null;   // 競合ダイアログ表示中 { name, rec, meta }
let cloudReady = false;

if (bridgeAvailable){
  // __PB_TEST_BRIDGE は自動テスト用のフェイク実装差し込みフック
  storage = window.__PB_TEST_BRIDGE || new StorageBridge({
    basePath: '/PlotBoard',
    storagePrefix: 'plotboard',
    ui: true,              // ブリッジ標準の接続UI（タイトル一覧ヘッダに表示）
    uiTarget: '#dbxMount',
  });
  storage.on('connected', onCloudConnected);
  storage.on('disconnected', () => {
    cloudReady = false;
    updateSyncUI();
    if (!titleView.hidden) refreshTitleList();
  });
  storage.on('error', e => console.warn('[sync]', e));
  if (storage.isConnected) queueMicrotask(onCloudConnected);
}
function canCloud(){ return !!(storage && storage.isConnected); }

async function onCloudConnected(){
  if (cloudReady) return;
  cloudReady = true;
  updateSyncUI();
  if (!titleView.hidden) await refreshTitleList();
  syncDirtyAll();
}

// rev取得（get_metadata）。ブリッジ未提供のAPIなので、ブリッジ本体は改造せず
// 期限切れ自動リトライ付きの内部fetch(_apiFetch)を利用する薄いラッパーで補う
async function dbxMeta(name){
  try{
    return await storage._apiFetch('files/get_metadata', {
      path: storage._resolve(name + '.json'),
    });
  }catch(e){
    if (String(e.message).includes('not_found')) return null;
    throw e;
  }
}

function scheduleCloudUpload(){
  if (!canCloud() || !state.currentName) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(() => syncNow(), CLOUD_DEBOUNCE_MS);
}

// アップロード（rev比較つき）。rev不一致＝他端末の更新 → 競合ダイアログ
async function syncNow(name){
  name = name || state.currentName;
  if (!name) return;
  clearTimeout(cloudTimer); cloudTimer = null;
  if (!canCloud() || !navigator.onLine || conflictPending){ updateSyncUI(); return; }
  const rec = (state.currentName === name && state.rec) ? state.rec : await idbTitleGet(name);
  if (!rec || !rec.dirty){ updateSyncUI(); return; }
  cloudBusy = true; updateSyncUI();
  try{
    const meta = await dbxMeta(name);
    // rev不一致（他端末の更新、または初回アップロード時に同名ファイルが既にある）
    if (meta && meta.rev !== rec.rev){
      openConflict(name, rec, meta);
      return;
    }
    const res = await storage.save(name + '.json', JSON.stringify(rec.doc));
    rec.rev = res.rev;
    rec.dirty = false;
    rec.syncedAt = new Date().toISOString();
    await idbTitlePut(rec);
  }catch(e){
    console.warn('[sync] アップロード失敗:', e);
  }finally{
    cloudBusy = false;
    updateSyncUI();
    if (!titleView.hidden) refreshTitleList();
  }
}

// 未同期(dirty)の全作品をアップロード（接続時・オンライン復帰時）
async function syncDirtyAll(){
  if (syncDirtyAll._busy) return;
  syncDirtyAll._busy = true;
  try{
    const all = await idbTitlesAll();
    for (const rec of all){
      if (!canCloud() || conflictPending) break;
      if (rec.dirty) await syncNow(rec.name);
    }
  }finally{
    syncDirtyAll._busy = false;
  }
}
window.addEventListener('online', () => { updateSyncUI(); if (canCloud()) syncDirtyAll(); });
window.addEventListener('offline', updateSyncUI);

syncBtn.addEventListener('click', async () => {
  if (saveTimer) await flushSave();
  syncNow();
});

/* ---------- 競合ダイアログ（2択＋保留） ---------- */
function openConflict(name, rec, meta){
  conflictPending = { name, rec, meta };
  $('conflictDesc').textContent =
    `「${name}」はこの端末での変更とは別に、他の端末で更新されています。` +
    `どちらの内容を残すか選んでください（自動では統合されません）。`;
  conflictModal.hidden = false;
  updateSyncUI();
}
async function resolveConflict(choice){
  const c = conflictPending;
  conflictPending = null;
  conflictModal.hidden = true;
  if (!c || choice === 'later'){ updateSyncUI(); return; }
  const { name, rec } = c;
  cloudBusy = true; updateSyncUI();
  try{
    if (choice === 'mine'){
      // この端末の内容で上書き
      const res = await storage.save(name + '.json', JSON.stringify(rec.doc));
      rec.rev = res.rev;
      rec.dirty = false;
      rec.syncedAt = new Date().toISOString();
      await idbTitlePut(rec);
    }else{
      // クラウドの内容を読み込む（この端末の変更は破棄）
      const text = await storage.load(name + '.json');
      const meta = await dbxMeta(name);
      rec.doc = normalizeDoc(JSON.parse(text));
      rec.doc.title = name;
      rec.rev = meta ? meta.rev : null;
      rec.dirty = false;
      rec.updatedAt = rec.doc.updatedAt || new Date().toISOString();
      rec.syncedAt = new Date().toISOString();
      await idbTitlePut(rec);
      if (state.currentName === name){
        state.rec = rec;
        state.doc = rec.doc;
        deselect();
        renderAll();
      }
    }
  }catch(e){
    console.warn('[sync] 競合解決に失敗:', e);
    rec.dirty = true;
  }finally{
    cloudBusy = false;
    updateSyncUI();
    if (!titleView.hidden) refreshTitleList();
  }
}
$('conflictMine').addEventListener('click', () => resolveConflict('mine'));
$('conflictCloud').addEventListener('click', () => resolveConflict('cloud'));
$('conflictLater').addEventListener('click', () => resolveConflict('later'));

/* ============================================================
 * タイトル（作品）管理
 * ============================================================ */
let remoteEntries = []; // 直近に取得したDropbox側ファイル一覧

function fmtDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  return `${d.getMonth() + 1}/${d.getDate()} ` +
         `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

async function refreshTitleList(){
  const locals = await idbTitlesAll();
  remoteEntries = [];
  if (canCloud()){
    try{
      remoteEntries = (await storage.list())
        .filter(e => e['.tag'] === 'file' && e.name.toLowerCase().endsWith('.json'));
    }catch(e){
      console.warn('[sync] 一覧取得失敗:', e);
    }
  }
  // ローカルとクラウドをマージ
  const items = new Map();
  for (const rec of locals) items.set(rec.name, { name: rec.name, rec, remote: null });
  for (const ent of remoteEntries){
    const name = ent.name.replace(/\.json$/i, '');
    const it = items.get(name);
    if (it) it.remote = ent;
    else items.set(name, { name, rec: null, remote: ent });
  }
  const arr = [...items.values()].sort((a, b) => {
    const ta = a.rec?.updatedAt || a.remote?.server_modified || '';
    const tb = b.rec?.updatedAt || b.remote?.server_modified || '';
    return tb.localeCompare(ta);
  });
  titleListEl.textContent = '';
  $('titleEmpty').hidden = arr.length > 0;
  for (const it of arr) titleListEl.appendChild(makeTitleRow(it));
}

function titleStatus(it){
  if (!it.rec)          return { cls: 'st-cloud',   label: 'クラウドのみ' };
  if (it.rec.dirty)     return { cls: 'st-pending', label: '同期待ち' };
  if (!canCloud())      return it.rec.rev ? { cls: 'st-synced', label: '同期済み' }
                                          : { cls: 'st-local',  label: 'ローカルのみ' };
  if (!it.remote)       return { cls: 'st-local',   label: 'ローカルのみ' };
  if (it.remote.rev === it.rec.rev) return { cls: 'st-synced', label: '同期済み' };
  return { cls: 'st-newer', label: 'クラウドに更新あり' };
}

function makeTitleRow(it){
  const li = document.createElement('li');
  li.className = 'tl-item';
  const main = document.createElement('div');
  main.className = 'tl-main';
  const nm = document.createElement('div');
  nm.className = 'tl-name';
  nm.textContent = it.name;
  const sub = document.createElement('div');
  sub.className = 'tl-sub';
  const date = document.createElement('span');
  date.textContent = fmtDate(it.rec?.updatedAt || it.remote?.server_modified);
  const st = titleStatus(it);
  const chip = document.createElement('span');
  chip.className = 'tl-chip ' + st.cls;
  chip.textContent = st.label;
  sub.append(date, chip);
  main.append(nm, sub);
  main.addEventListener('click', () => openTitle(it.name));
  li.appendChild(main);
  if (it.rec){ // 名前変更はローカルにある作品のみ（クラウドのみは一度開いてから）
    const rn = document.createElement('button');
    rn.className = 'tl-act';
    rn.title = '名前変更';
    rn.textContent = '✎';
    rn.addEventListener('click', () => renameTitle(it.name));
    li.appendChild(rn);
  }
  const del = document.createElement('button');
  del.className = 'tl-act';
  del.title = '削除';
  del.textContent = '🗑';
  del.addEventListener('click', () => deleteTitle(it));
  li.appendChild(del);
  return li;
}

/* ---- 名前入力モーダル（新規作成/名前変更 共用） ---- */
let nameCb = null, nameExclude = null;
function openNameModal(title, initial, cb, exclude){
  $('nameModalTitle').textContent = title;
  nameInput.value = initial || '';
  nameError.hidden = true;
  nameModal.hidden = false;
  nameCb = cb;
  nameExclude = exclude || null;
  nameInput.focus();
  nameInput.select();
}
function closeNameModal(){
  nameModal.hidden = true;
  nameCb = null;
  nameExclude = null;
}
async function validateName(name){
  if (!name) return 'タイトルを入力してください';
  if (NAME_FORBIDDEN.test(name)) return '使用できない文字が含まれています: \\ / : ? * " < > |';
  if (name.length > 80) return 'タイトルが長すぎます（80文字まで）';
  if (nameExclude && name === nameExclude) return null; // リネームで名前そのまま
  const lower = name.toLowerCase();
  const locals = await idbTitlesAll();
  if (locals.some(r => r.name.toLowerCase() === lower) ||
      remoteEntries.some(e => e.name.toLowerCase() === lower + '.json')){
    return '同名の作品がすでにあります';
  }
  return null;
}
async function submitName(){
  const name = nameInput.value.trim();
  const err = await validateName(name);
  if (err){
    nameError.textContent = err;
    nameError.hidden = false;
    return;
  }
  const cb = nameCb;
  closeNameModal();
  if (cb) cb(name);
}
$('nameOk').addEventListener('click', submitName);
$('nameCancel').addEventListener('click', closeNameModal);
nameInput.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') submitName();
  else if (e.key === 'Escape') closeNameModal();
});
nameModal.addEventListener('pointerdown', e => {
  if (e.target === nameModal) closeNameModal();
});

/* ---- 新規作成 ---- */
newTitleBtn.addEventListener('click', () => {
  openNameModal('新規作成', '', async (name) => {
    const now = new Date().toISOString();
    const doc = newDoc(name);
    doc.updatedAt = now;
    doc.device = deviceId;
    const rec = { name, doc, rev: null, dirty: true, updatedAt: now, syncedAt: null };
    await idbTitlePut(rec);
    openTitle(name);
  });
});

/* ---- 名前変更 ----
 * 同期済み作品はDropbox側のリネーム(move)も伴うため、オフライン中は不可
 * （採用理由: 「次回同期時に反映」方式はリネーム待ちキューの管理が増えるため） */
async function renameTitle(oldName){
  const rec = await idbTitleGet(oldName);
  if (!rec) return;
  if (rec.rev && !canCloud()){
    alert('同期済みの作品の名前変更にはDropbox接続が必要です（オフライン中は不可）');
    return;
  }
  openNameModal('名前変更', oldName, async (newName) => {
    if (newName === oldName) return;
    try{
      if (rec.rev && canCloud()){
        const mv = await storage.move(oldName + '.json', newName + '.json');
        rec.rev = mv?.metadata?.rev || rec.rev; // moveでrevが変わる
      }
      rec.name = newName;
      rec.doc.title = newName;
      rec.updatedAt = new Date().toISOString();
      if (!rec.rev) rec.dirty = true;
      await idbTitlePut(rec);
      await idbTitleDelete(oldName);
      if (state.currentName === oldName){
        state.currentName = newName;
        boardTitleEl.textContent = newName;
      }
      refreshTitleList();
    }catch(e){
      alert('名前変更に失敗しました: ' + e.message);
    }
  }, oldName);
}

/* ---- 削除（ローカルとクラウド両方から） ---- */
async function deleteTitle(it){
  const name = it.name;
  const hasRemote = !!it.remote || !!(it.rec && it.rec.rev);
  if (hasRemote && !canCloud()){
    alert('同期済みの作品の削除にはDropbox接続が必要です（オフライン中は不可）');
    return;
  }
  const msg = hasRemote
    ? `「${name}」を削除します。\nこの端末とDropboxの両方から削除され、元に戻せません。よろしいですか？`
    : `「${name}」を削除します。元に戻せません。よろしいですか？`;
  if (!confirm(msg)) return;
  try{
    if (hasRemote && canCloud()){
      try{ await storage.delete(name + '.json'); }
      catch(e){ if (!String(e.message).includes('not_found')) throw e; }
    }
    await idbTitleDelete(name);
    refreshTitleList();
  }catch(e){
    alert('削除に失敗しました: ' + e.message);
  }
}

/* ============================================================
 * ビュー切替（タイトル一覧 ⇔ ボード）
 * ============================================================ */
async function openTitle(name){
  let rec = await idbTitleGet(name);
  if (!rec){
    // クラウドのみの作品 → ダウンロードしてローカル化
    if (!canCloud()) return;
    try{
      const text = await storage.load(name + '.json');
      const meta = await dbxMeta(name);
      const doc = normalizeDoc(JSON.parse(text));
      doc.title = name;
      rec = {
        name, doc,
        rev: meta ? meta.rev : null,
        dirty: false,
        updatedAt: doc.updatedAt || meta?.server_modified || new Date().toISOString(),
        syncedAt: new Date().toISOString(),
      };
      await idbTitlePut(rec);
    }catch(e){
      alert('ダウンロードに失敗しました: ' + e.message);
      return;
    }
  }
  state.currentName = name;
  state.rec = rec;
  state.doc = rec.doc;
  state.selectedId = null;
  titleView.hidden = true;
  boardView.hidden = false;
  boardTitleEl.textContent = name;
  renderAll();
  updateSyncUI();
  if (canCloud()) checkRemoteUpdate(name); // 開いた直後にクラウドの最新を確認（非同期）
}

// クラウド側が新しければダウンロードして置き換え。ローカルに未同期変更があれば競合
async function checkRemoteUpdate(name){
  try{
    const meta = await dbxMeta(name);
    if (!meta || state.currentName !== name) return;
    const rec = state.rec;
    if (meta.rev === rec.rev) return;
    if (rec.dirty){ openConflict(name, rec, meta); return; }
    const text = await storage.load(name + '.json');
    if (state.currentName !== name) return;
    rec.doc = normalizeDoc(JSON.parse(text));
    rec.doc.title = name;
    rec.rev = meta.rev;
    rec.updatedAt = rec.doc.updatedAt || new Date().toISOString();
    rec.syncedAt = new Date().toISOString();
    await idbTitlePut(rec);
    state.doc = rec.doc;
    deselect();
    renderAll();
    updateSyncUI();
  }catch(e){
    console.warn('[sync] 最新確認に失敗:', e);
  }
}

async function showTitleView(){
  // ボードを離れる前に編集状態を閉じて保存・同期をフラッシュ
  commitTitleEdit();
  cancelPlacing();
  closeMemoModal(false);
  deselect();
  if (saveTimer) await flushSave();
  const name = state.currentName;
  state.currentName = null;
  state.rec = null;
  boardView.hidden = true;
  titleView.hidden = false;
  await refreshTitleList();
  if (name) syncNow(name); // 裏でアップロード（fire and forget）
}
backBtn.addEventListener('click', showTitleView);

/* ---------- 起動 ---------- */
(async function init(){
  try{
    await openDB();
    // マイグレーション: Phase 2までの単一ボードデータを「無題」として取り込む
    const titles = await idbTitlesAll();
    if (titles.length === 0){
      const legacy = await idbLegacyLoad();
      if (legacy){
        const doc = normalizeDoc(legacy);
        const now = new Date().toISOString();
        doc.title = '無題';
        doc.updatedAt = doc.updatedAt || now;
        doc.device = doc.device || deviceId;
        await idbTitlePut({
          name: '無題', doc,
          rev: null, dirty: true,
          updatedAt: doc.updatedAt, syncedAt: null,
        });
        // 旧データ(docsストア)は万一に備えてそのまま残す（削除しない）
      }
    }
  }catch(err){
    console.error('初期化エラー:', err);
  }
  await refreshTitleList();
  updateSyncUI();
})();
</script>
